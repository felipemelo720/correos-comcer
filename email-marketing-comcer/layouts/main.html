<!DOCTYPE {{{ page.doctype || 'html' }}}>
<html lang="{{ page.language || 'en' }}" xmlns:v="urn:schemas-microsoft-com:vml">
<head>
  <meta charset="{{ page.charset || 'utf-8' }}">
  <meta name="x-apple-disable-message-reformatting">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no, url=no">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings xmlns:o="urn:schemas-microsoft-com:office:office">
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <style>
    td,th,div,p,a,h1,h2,h3,h4,h5,h6 {font-family: "Segoe UI", sans-serif; mso-line-height-rule: exactly;}
    .mso-break-all {word-break: break-all;}
  </style>
  <![endif]-->
  <if condition="page.title">
    <title>{{{ page.title }}}</title>
  </if>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" media="screen">
  <style>
    @tailwind components;
    @tailwind utilities;

    img {
      @apply max-w-full align-middle;
    }

    /* Button hover styles for email clients that support it */
    .button-hover:hover {
      background-color: #1d4ed8 !important;
    }

    @media (max-width: 600px) {
      .sm\:block { display: block !important; }
      .sm\:w-full { width: 100% !important; }
      .sm\:mb-4 { margin-bottom: 16px !important; }
      .sm\:mb-2 { margin-bottom: 8px !important; }
      .sm\:pr-0 { padding-right: 0 !important; }
      .sm\:pl-0 { padding-left: 0 !important; }
      .sm\:p-2 { padding: 8px !important; }
      .sm\:p-4 { padding: 16px !important; }
      .sm\:text-3xl { font-size: 1.875rem !important; }
      .sm\:text-2xl { font-size: 1.5rem !important; }
      .sm\:text-base { font-size: 1rem !important; }
      .sm\:text-xs { font-size: 0.75rem !important; }
      .sm\:border-0 { border-width: 0 !important; }
      .sm\:border-b { border-bottom-width: 1px !important; }
      .sm\:pb-4 { padding-bottom: 16px !important; }

      /* Force table cells to stack on mobile */
      table tr td[class*="sm:block"] {
        display: block !important;
        width: 100% !important;
      }
    }
  </style>
  <stack name="head" />
</head>
<body class="m-0 p-0 w-full [word-break:break-word] [-webkit-font-smoothing:antialiased] {{ page.bodyClass || '' }}">
  <if condition="page.preheader">
    <div class="hidden">
      {{{ page.preheader }}}
      <each loop="item in Array.from(Array(150))">&#8199;&#65279;&#847; </each>
    </div>
  </if>
  <div role="article" aria-roledescription="email" aria-label="{{{ page.title || '' }}}" lang="{{ page.language || 'en' }}">
    <yield />
  </div>
</body>
</html>
